# Self-contained Postgres + pgvector for the MiCA copilot.
# `docker compose up -d` gives a grader a working vector store with no external setup.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mica-copilot-db
    restart: unless-stopped   # auto-recover on host reboot / docker daemon restart
    environment:
      POSTGRES_USER: mica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mica}   # real value from .env (gitignored); 'mica' is the fresh-clone dev default
      POSTGRES_DB: mica
    ports:
      - "127.0.0.1:5433:5432" # bind to localhost ONLY (never expose the DB on the LAN); host 5433 -> container 5432
    volumes:
      - ./db/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - mica_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mica -d mica"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mica_pgdata:
